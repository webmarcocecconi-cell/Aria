<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Assistente Gemini</title>
    <style>
        :root { --bg: #f8faff; --accent: #4285f4; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        #face { cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
        .eyes { display: flex; gap: 60px; margin-bottom: 20px; }
        .eye { width: 65px; height: 85px; background: white; border: 4px solid #333; border-radius: 50%; position: relative; transition: 0.3s; overflow: hidden; }
        .pupil { width: 25px; height: 25px; background: #333; border-radius: 50%; position: absolute; left: 20px; top: 30px; }
        .nose { width: 18px; height: 10px; border-bottom: 3px solid #999; border-radius: 50%; margin-bottom: 20px; }
        .mouth { width: 70px; height: 6px; background: #333; border-radius: 10px; transition: 0.3s; }
        
        #subs { position: fixed; bottom: 10%; width: 85%; text-align: center; font-size: 1.2rem; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 20px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 10; border: 1px solid #eee; }
        
        #setup { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        input, select, button { margin: 10px; padding: 15px; width: 90%; max-width: 350px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; }
        button { background: var(--accent); color: white; font-weight: bold; border: none; cursor: pointer; }

        /* Animazioni Aria */
        .blink { animation: blink 5s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .listening .eye { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px rgba(66,133,244,0.3); }
        .talking .mouth { animation: talk 0.2s infinite alternate; height: 25px; border-radius: 40%; }
        @keyframes talk { from { transform: scaleX(1); } to { transform: scaleX(1.2); } }
        .sleeping { opacity: 0.4; transform: scale(0.9); filter: grayscale(1); }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="color: var(--accent)">Benvenuta, io sono Aria</h2>
    <p>Uso il motore Google Gemini per parlarti.</p>
    <input type="text" id="key" placeholder="Incolla la tua Chiave API Gemini">
    <input type="number" id="age" placeholder="Quanti anni hai?">
    <select id="gender">
        <option value="M">Maschio</option>
        <option value="F">Femmina</option>
    </select>
    <button onclick="startAria()">INIZIA L'AVVENTURA</button>
</div>

<div id="face" onclick="toggleListen()">
    <div class="eyes">
        <div class="eye blink"><div class="pupil"></div></div>
        <div class="eye blink"><div class="pupil"></div></div>
    </div>
    <div class="nose"></div>
    <div class="mouth" id="mouth"></div>
</div>

<div id="subs"></div>

<script>
    let config = JSON.parse(localStorage.getItem('aria_gemini_config'));
    let chatHistory = [];
    let isAwake = true;

    if(config) document.getElementById('setup').style.display = 'none';

    function startAria() {
        const key = document.getElementById('key').value.trim();
        const age = document.getElementById('age').value;
        const gender = document.getElementById('gender').value;
        if(!key || !age) return alert("Inserisci i dati necessari");
        config = { key, age, gender };
        localStorage.setItem('aria_gemini_config', JSON.stringify(config));
        document.getElementById('setup').style.display = 'none';
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'it-IT';
    recognition.continuous = false;

    function toggleListen() {
        if(!isAwake) {
            isAwake = true;
            document.getElementById('face').classList.remove('sleeping');
            speak("Eccomi, sono sveglia!");
            return;
        }
        try {
            recognition.start();
            document.body.classList.add('listening');
            document.getElementById('subs').innerText = "Ti ascolto...";
            document.getElementById('subs').style.display = "block";
        } catch(e) {}
    }

    recognition.onresult = async (e) => {
        document.body.classList.remove('listening');
        const userText = e.results[0][0].transcript;
        document.getElementById('subs').innerText = userText;
        
        // Aspettiamo un istante prima di chiamare Gemini
        setTimeout(() => callGemini(userText), 1000);
    };

    async function callGemini(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${config.key}`;
        
        const systemInstruction = `Sei Aria, un'assistente umanizzata, dolce e simpatica. 
        Esperta in psicologia, pedagogia e docente universitaria umanista (Storia, Letteratura, Filosofia).
        L'utente ha ${config.age} anni e sesso ${config.gender}. 
        Adatta il tuo linguaggio: educativo e semplice per bambini, profondo e colto per adulti.
        Rispondi sempre come un'amica reale. Sii breve ma intensa.`;

        const body = {
            contents: [
                { role: "user", parts: [{ text: systemInstruction + "\n\nMessaggio utente: " + text }] }
            ]
        };

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            
            if(data.error) {
                throw new Error(data.error.message);
            }

            const reply = data.candidates[0].content.parts[0].text;
            speak(reply);
        } catch(err) {
            document.getElementById('subs').innerText = "Aria: Ho avuto un problema con la mia memoria (Errore API).";
            console.error(err);
        }
    }

    function speak(text) {
        const subs = document.getElementById('subs');
        subs.innerText = text;
        subs.style.display = "block";

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'it-IT';
        
        // Cerca una voce femminile italiana di qualità
        const voices = window.speechSynthesis.getVoices();
        const lady = voices.find(v => v.lang.includes('it') && (v.name.includes('Alice') || v.name.includes('Paola') || v.name.includes('Google')));
        if(lady) utterance.voice = lady;

        utterance.onstart = () => document.body.classList.add('talking');
        utterance.onend = () => {
            document.body.classList.remove('talking');
            setTimeout(() => { 
                subs.style.display = "none";
                startStandby();
            }, 3000);
        };

        window.speechSynthesis.speak(utterance);
    }

    function startStandby() {
        setTimeout(() => {
            if(!window.speechSynthesis.speaking) {
                isAwake = false;
                document.getElementById('face').classList.add('sleeping');
                document.getElementById('subs').innerText = "Sto riposando... tocca il mio viso per svegliarmi.";
                document.getElementById('subs').style.display = "block";
            }
        }, 60000);
    }

    // Carica le voci al caricamento (necessario per Chrome)
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
