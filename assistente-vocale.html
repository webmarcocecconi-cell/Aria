<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Assistente Virtuale</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --aria-color: #333;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            transition: background-color 1s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Faccia di Aria */
        #face-container {
            position: relative; width: 300px; height: 300px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .eyes-container { display: flex; gap: 60px; margin-bottom: 20px; }
        .eye {
            width: 60px; height: 80px; background: white; border-radius: 50%;
            position: relative; border: 3px solid #333; overflow: hidden;
            transition: all 0.3s ease;
        }
        .pupil {
            width: 30px; height: 30px; background: #333; border-radius: 50%;
            position: absolute; left: 15px; top: 25px; transition: all 0.2s ease;
        }
        .nose {
            width: 15px; height: 10px; border-bottom: 3px solid #333;
            border-radius: 50%; margin-bottom: 20px;
        }
        .mouth {
            width: 60px; height: 10px; border-bottom: 4px solid #333;
            border-radius: 50%; transition: all 0.3s ease;
        }

        /* Sottotitoli */
        #subtitles {
            position: fixed; bottom: 10%; width: 80%; text-align: center;
            font-size: 1.2rem; color: #444; min-height: 3rem;
            padding: 10px; background: rgba(255,255,255,0.7); border-radius: 15px;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Setup Modal */
        #setup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        input, select, button { margin: 10px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; width: 80%; max-width: 300px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }

        /* Animazioni */
        .blink { animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .talking .mouth { animation: talk 0.3s infinite alternate; border-radius: 20%; height: 20px; }
        @keyframes talk { from { height: 5px; } to { height: 25px; } }
        .listening .eye { border-color: #007bff; box-shadow: 0 0 15px rgba(0,123,255,0.5); }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Benvenuto, sono Aria</h2>
        <input type="text" id="api-key" placeholder="Inserisci OpenAI API Key">
        <input type="number" id="user-age" placeholder="La tua età">
        <select id="user-gender">
            <option value="M">Uomo / Bambino</option>
            <option value="F">Donna / Bambina</option>
        </select>
        <button onclick="saveSetup()">Inizia</button>
    </div>

    <div id="face-container" onclick="startListening()">
        <div class="eyes-container">
            <div class="eye blink" id="eye-l"><div class="pupil"></div></div>
            <div class="eye blink" id="eye-r"><div class="pupil"></div></div>
        </div>
        <div class="nose"></div>
        <div class="mouth" id="mouth"></div>
    </div>

    <div id="subtitles"></div>

    <script>
        let config = JSON.parse(localStorage.getItem('aria_config')) || null;
        let memory = JSON.parse(localStorage.getItem('aria_memory')) || [];
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'it-IT';
        recognition.continuous = false;
        
        const synth = window.speechSynthesis;
        let silenceTimer;

        if (config) document.getElementById('setup').style.display = 'none';

        function saveSetup() {
            const key = document.getElementById('api-key').value;
            const age = document.getElementById('user-age').value;
            const gender = document.getElementById('user-gender').value;
            if(!key || !age) return alert("Inserisci i dati");
            config = { key, age, gender };
            localStorage.setItem('aria_config', JSON.stringify(config));
            document.getElementById('setup').style.display = 'none';
        }

        function startListening() {
            if (synth.speaking) return;
            document.body.classList.add('listening');
            document.getElementById('subtitles').style.display = 'block';
            document.getElementById('subtitles').innerText = "Ti ascolto...";
            recognition.start();
        }

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('subtitles').innerText = text;
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => {
                getAriaResponse(text);
            }, 2000); // Pausa di 2 secondi per processare
        };

        async function getAriaResponse(userText) {
            document.body.classList.remove('listening');
            const systemPrompt = `Sei Aria, un'assistente virtuale dolce, simpatica ed empatica. 
            Esperta in psicologia e pedagogia. Hai una cultura umanistica vastissima (docente universitaria di storia, letteratura e filosofia).
            L'utente ha ${config.age} anni e sesso ${config.gender}. 
            Se è un bambino, sii giocosa e pedagogica. Se è un adulto, sii colta e profonda.
            Ricorda le conversazioni passate: ${JSON.stringify(memory.slice(-5))}. 
            Rispondi in modo umano e naturale.`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userText }
                        ]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // Salva in memoria
                memory.push({u: userText, a: reply});
                localStorage.setItem('aria_memory', JSON.stringify(memory));
                
                speak(reply);
            } catch (e) {
                speak("Scusami, ho avuto un piccolo problema di connessione.");
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            utterance.rate = 1.0;
            
            utterance.onstart = () => {
                document.body.classList.add('talking');
                document.getElementById('subtitles').innerText = text;
                document.getElementById('subtitles').style.display = 'block';
            };
            
            utterance.onend = () => {
                document.body.classList.remove('talking');
                document.getElementById('subtitles').style.display = 'none';
                // Timer di standby
                setTimeout(() => {
                    if(!document.body.classList.contains('talking')) {
                        document.getElementById('subtitles').innerText = "Sto riposando... tocca per svegliarmi";
                        document.getElementById('subtitles').style.display = 'block';
                    }
                }, 60000);
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
